<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HOMIEWOOD - Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/home.css" />
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar-homi" aria-label="Navegación principal">
        <a href="./home.html" class="brand">
            <img src="../img/hamstersolo.webp" alt="Homiewood" width="40px">
        </a>

        <div class="nav-links d-none d-md-flex gap-4">
            <a href="#">Trending</a>
            <a href="#">Mis Homies</a>
            <a href="#">Lanzamientos</a>
        </div>

        <div class="nav-search-wrap" id="navSearchWrap">
            <button type="button" class="nav-search-toggle" id="navSearchToggle" aria-label="Buscar" aria-expanded="false">
                <i class="bi bi-search"></i>
            </button>
            <div class="nav-search-bar" id="navSearchBar" aria-hidden="true">
                <input type="text" id="navSearchInput" placeholder="Buscar películas, series..." autocomplete="off" />
                <button type="button" class="nav-search-close" id="navSearchClose" aria-label="Cerrar búsqueda">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </div>

        <div class="nav-icons d-flex gap-1">
            <button type="button" aria-label="Notificaciones"><i class="bi bi-bell-fill"></i></button>
            <button type="button" class="sidebar-toggle d-md-none" id="sidebarToggle" aria-label="Ver recomendaciones">
                <i class="bi bi-list"></i>
            </button>
        </div>

        <span id="navbar-username" class="nombre-usuario">Usuario</span>

        <button type="button" class="avatar" onclick="window.location.href='./profile.html'" title="Ver perfil">
            <img src="../img/hamstericon.webp" alt="Perfil" width="30px">
        </button>
    </nav>

    <!-- MAIN -->
    <div class="main-row">

        <!-- FEED -->
        <div class="feed-col">

            <!-- COMPOSER -->
            <div class="composer" id="composer">
                <button class="composer-collapsed-trigger" id="composerTrigger" aria-expanded="false">
                    <div class="user-icon">🎥</div>
                    <span>¿Qué estás viendo hoy?</span>
                </button>

                <div class="composer-body" id="composerBody" aria-hidden="true">
                    <p class="composer-label">1. Elige una película o serie</p>

                    <div class="film-search-wrap" id="filmSearchWrap">
                        <input type="text" id="filmSearchInput" placeholder="🎬 Buscar película o serie..." autocomplete="off">
                        <div class="film-dropdown" id="filmDropdown"></div>
                    </div>

                    <div class="selected-film" id="selectedFilm">
                        <div class="mini-cover" id="selectedCover"></div>
                        <div class="selected-film-info">
                            <div id="selectedTitle" class="selected-title"></div>
                            <div id="selectedMeta" class="selected-meta"></div>
                            <div class="chip-tags" id="selectedTags"></div>
                        </div>
                        <button class="remove-film" id="removeFilm" title="Quitar">✕</button>
                    </div>

                    <p class="composer-label">2. ¿Qué quieres compartir?</p>

                    <textarea id="postText" placeholder="Cuéntale a tus homies..." class="mb-3"></textarea>

                    <div class="composer-actions">
                        <button class="post-submit-btn" id="postBtn" disabled>Postear</button>
                    </div>
                </div>
            </div>

            <!-- POSTS -->
            <div id="feed"></div>
        </div>

        <!-- SIDEBAR DESKTOP -->
        <aside class="sidebar-col" id="sidebarDesktop" aria-label="Recomendaciones">
            <div class="sidebar">

                <div class="sidebar-header">
                    <span>RECOMENDACIONES PARA TI</span>
                    <a href="#">Ver todas</a>
                </div>

                <div class="row g-2 mb-3">
                    <div class="col-6">
                        <div class="cover c1 cover-clickable" data-title="Stranger Things 5"

                            data-cast="Millie Bobby Brown, Finn Wolfhard, Winona Ryder, David Harbour"
                            data-desc="La quinta y última temporada de Stranger Things. Los protagonistas se enfrentan al mayor peligro del Upside Down en la batalla final por Hawkins."

                            <img src="https://m.media-amazon.com/images/M/MV5BOWU2NjY5NWQtMjdkZi00ODJlLThkZTAtMzFlYmJmMGE2NjZkXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg" alt="Stranger Things 5" width="129.8px">
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="cover c2 cover-clickable" data-title="The Return of The Living Dead"

                    </div>

                </div>

                <div class="sidebar-header">
                    <span>LANZAMIENTOS</span>
                    <a href="#">Ver todas</a>
                </div>

                <div class="row g-2">
                    <div class="col-4">
                        <div class="cover c5 cover-clickable" data-title="Devil Wears Prada 2"
                            data-director="David Frankel" data-year="2025" data-tags="Película,Drama"
                            data-cast="Meryl Streep, Anne Hathaway, Emily Blunt"
                            data-desc="La secuela esperada del clásico de moda. Miranda Priestly regresa con nuevos desafíos en el mundo editorial y de la alta costura."

                        </div>
                    </div>
                    <div class="col-4">
                        <div class="cover c6 cover-clickable" data-title="Michael"
                            data-director="Antoine Fuqua" data-year="2025" data-tags="Película,Drama"
                            data-cast="Jaafar Jackson, Nia Long, Colman Domingo"
                            data-desc="Biopic sobre la vida del rey del pop Michael Jackson, desde su infancia hasta convertirse en la mayor estrella de la música del siglo XX."

                    </div>
                    <div class="col-4">
                        <div class="cover c7 cover-clickable" data-title="Toy Story 5"
                            data-director="Andrew Stanton" data-year="2026" data-tags="Película,Aventura"
                            data-cast="Tom Hanks, Tim Allen, Annie Potts"
                            data-desc="Woody, Buzz y el resto de los juguetes regresan en una nueva aventura que llevará a los personajes más queridos de Pixar a lugares nunca antes explorados."

                            <img src="https://m.media-amazon.com/images/M/MV5BZTI1YTBiNmEtYWUxZi00YzFkLWIzNjMtMmZjMmY2NzM0ZWMzXkEyXkFqcGc@._V1_.jpg" alt="Toy Story 5" width="80px">
                        </div>
                    </div>
                </div>

            </div>
        </aside>
    </div>

        <div class="sidebar-drawer-inner">

            <button class="sidebar-drawer-close" id="sidebarDrawerClose" aria-label="Cerrar recomendaciones">

            <div class="sidebar-header">
                <span>LANZAMIENTOS</span>
                <a href="#">Ver todas</a>
            </div>

            <div class="row g-2">
                <div class="col-4">
                    <div class="cover c5 cover-clickable" data-title="Devil Wears Prada 2"
                        data-director="David Frankel" data-year="2025" data-tags="Película,Drama"

    <!-- OVERLAY del drawer -->
    <div class="sidebar-drawer-overlay" id="sidebarDrawerOverlay"></div>

    <!-- MODAL DE PELÍCULA -->
    <div class="film-modal-overlay" id="filmModalOverlay" aria-hidden="true">
        <div class="film-modal" role="dialog" aria-modal="true" aria-labelledby="filmModalTitle">
            <button class="film-modal-close" id="filmModalClose" aria-label="Cerrar">✕</button>

            <div class="film-modal-body">
                <div class="film-modal-poster" id="filmModalPoster"></div>

                <div class="film-modal-info">
                    <div class="film-modal-title" id="filmModalTitle"></div>
                    <div class="film-modal-sub" id="filmModalSub"></div>
                    <div class="film-modal-tags" id="filmModalTags"></div>
                    <div class="film-modal-cast" id="filmModalCast"></div>
                    <p class="film-modal-desc" id="filmModalDesc"></p>

                    <!-- ESTRELLAS -->
                    <div class="film-modal-rating">
                        <span class="film-modal-section-label">TU VALORACIÓN</span>
                        <div class="star-rating" id="filmModalStars" role="group" aria-label="Valoración de 1 a 5 estrellas">
                            <button class="star-btn" data-value="1" aria-label="1 estrella"><i class="bi bi-star"></i></button>
                            <button class="star-btn" data-value="2" aria-label="2 estrellas"><i class="bi bi-star"></i></button>
                            <button class="star-btn" data-value="3" aria-label="3 estrellas"><i class="bi bi-star"></i></button>
                            <button class="star-btn" data-value="4" aria-label="4 estrellas"><i class="bi bi-star"></i></button>
                            <button class="star-btn" data-value="5" aria-label="5 estrellas"><i class="bi bi-star"></i></button>
                        </div>
                    </div>

                    <!-- AGREGAR A LISTA -->
                    <div class="film-modal-lists">
                        <span class="film-modal-section-label">Agregar a lista</span>
                        <div class="add-to-list-wrap">
                            <button type="button" class="add-to-list-btn" id="addToListBtn" aria-expanded="false" aria-label="Agregar a lista">
                                <i class="bi bi-plus-lg"></i>
                            </button>
                            <div class="add-to-list-dropdown" id="addToListDropdown" aria-hidden="true">
                                <button type="button" class="list-option" data-list="top5">
                                    <img src="../img/TOP5LIST(noglow).webp" width="40px">
                                    <span>Top 5</span>
                                    <i class="bi bi-check2 list-check" id="check-top5"></i>
                                </button>
                                <button type="button" class="list-option" data-list="watchlist">
                                    <img src="../img/WATCHLIST(noglow).webp" width="40px">
                                    <span>Watchlist</span>
                                    <i class="bi bi-check2 list-check" id="check-watchlist"></i>
                                </button>
                                <button type="button" class="list-option" data-list="porver">
                                    <img src="../img/PENDINGLIST(noglow).webp" width="40px">
                                    <span>Por ver</span>
                                    <i class="bi bi-check2 list-check" id="check-porver"></i>
                                </button>
                            </div>
                        </div>
                        <div class="list-badges" id="listBadges"></div>
                    </div>

                </div>
            </div>
        </div>
    </div>

            </button>

            <button class="bottom-nav-btn" onclick="window.location.href='./home.html'">

            </button>

            <button class="bottom-nav-btn" onclick="window.location.href='./profile.html'">
                <span><img src="../img/home_profileicon(noglow).webp" alt="Perfil" width="40px"></span>
                <span class="bottom-nav-label">Perfil</span>
            </button>
        </div>
    </nav>

    <script>
        document.addEventListener("nuevaCalificacion", function(e) {
            const calificacion = e.detail;
            console.log("Nueva calificación en tiempo real:", calificacion.contenido.titulo);
        });

        function cerrarSesion() {
            localStorage.removeItem("token");
            localStorage.removeItem("usuario");
            window.location.href = "./login.html";
        }
    </script>
