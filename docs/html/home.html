<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HOMIEWOOD - Home</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap"
        rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../css/home.css" />
</head>

<body>

    <!-- ========================= -->
    <!-- NAVBAR -->
    <!-- ========================= -->

    <nav class="navbar-homi" aria-label="Navegación principal">

        <!-- LOGO -->
        <a href="./home.html" class="brand">
            <img
                src="../img/hamstersolo.webp"
                alt="Homiewood"
                width="40px"
            >
        </a>

        <!-- LINKS -->
        <div class="nav-links d-none d-md-flex gap-4">
            <a href="#">Trending</a>
            <a href="#">Mis Homies</a>
            <a href="#">Lanzamientos</a>
        </div>

        <!-- SEARCH -->
        <div class="nav-search-wrap" id="navSearchWrap">

            <button
                type="button"
                class="nav-search-toggle"
                id="navSearchToggle"
                aria-label="Buscar"
                aria-expanded="false"
            >

                <i class="bi bi-search"></i>

            </button>

            <div
                class="nav-search-bar"
                id="navSearchBar"
                aria-hidden="true"
            >

                <input
                    type="text"
                    id="navSearchInput"
                    placeholder="Buscar películas, series..."
                    autocomplete="off"
                />

                <button
                    type="button"
                    class="nav-search-close"
                    id="navSearchClose"
                    aria-label="Cerrar búsqueda"
                >

                    <i class="bi bi-x-lg"></i>

                </button>

            </div>

        </div>

        <!-- ICONOS -->
        <div class="nav-icons d-flex gap-1">

            <button type="button" aria-label="Notificaciones">
                <i class="bi bi-bell-fill"></i>
            </button>

            <button
                type="button"
                class="sidebar-toggle d-md-none"
                id="sidebarToggle"
                aria-label="Ver recomendaciones"
            >

                <i class="bi bi-list"></i>

            </button>

        </div>

        <!-- USERNAME -->
        <span
            id="navbar-username"
            class="nombre-usuario"
        >
            Usuario
        </span>

        <!-- PROFILE -->
        <button
            type="button"
            class="avatar"
            onclick="window.location.href='./profile.html'"
            title="Ver perfil"
        >

            <img
                src="../img/hamstericon.webp"
                alt="Perfil"
                width="30px"
            >

        </button>

    </nav>

    <!-- ========================= -->
    <!-- MAIN -->
    <!-- ========================= -->

    <div class="main-row">

        <!-- ========================= -->
        <!-- FEED -->
        <!-- ========================= -->

        <div class="feed-col">

            <!-- COMPOSER -->
            <div class="composer" id="composer">

                <button
                    class="composer-collapsed-trigger"
                    id="composerTrigger"
                    aria-expanded="false"
                >

                    <div class="user-icon">🎥</div>
                    <span>¿Qué estás viendo hoy?</span>

                </button>

                <div
                    class="composer-body"
                    id="composerBody"
                    aria-hidden="true"
                >

                    <p class="composer-label">
                        1. Elige una película o serie
                    </p>

                    <!-- BUSCADOR -->
                    <div
                        class="film-search-wrap"
                        id="filmSearchWrap"
                    >

                        <input
                            type="text"
                            id="filmSearchInput"
                            placeholder="🎬 Buscar película o serie..."
                            autocomplete="off"
                        >

                        <div
                            class="film-dropdown"
                            id="filmDropdown"
                        ></div>

                    </div>

                    <!-- SELECTED FILM -->
                    <div
                        class="selected-film"
                        id="selectedFilm"
                    >

                        <div
                            class="mini-cover"
                            id="selectedCover"
                        ></div>

                        <div class="selected-film-info">

                            <div
                                id="selectedTitle"
                                class="selected-title"
                            ></div>

                            <div
                                id="selectedMeta"
                                class="selected-meta"
                            ></div>

                            <div
                                class="chip-tags"
                                id="selectedTags"
                            ></div>

                        </div>

                        <button
                            class="remove-film"
                            id="removeFilm"
                            title="Quitar"
                        >
                            ✕
                        </button>

                    </div>

                    <p class="composer-label">
                        2. ¿Qué quieres compartir?
                    </p>

                    <textarea
                        id="postText"
                        placeholder="Cuéntale a tus homies..."
                        class="mb-3"
                    ></textarea>

                    <div class="composer-actions">

                        <button
                            class="post-submit-btn"
                            id="postBtn"
                            disabled
                        >
                            Postear
                        </button>

                    </div>

                </div>

            </div>

            <!-- POSTS -->
            <div id="feed"></div>

        </div>

        <!-- ========================= -->
        <!-- SIDEBAR -->
        <!-- ========================= -->

        <aside
            class="sidebar-col"
            id="sidebarDesktop"
            aria-label="Recomendaciones"
        >

            <div class="sidebar">

                <!-- RECOMENDACIONES -->
                <div class="sidebar-header">

                    <span>RECOMENDACIONES PARA TI</span>

                    <button
                        class="btn-ver-todas"
                        onclick="window.location.href='./recommendations.html'"
                    >
                        Ver todas
                    </button>

                </div>

                <div class="row g-2 mb-3">

                    <div class="col-6">

                        <div class="cover c1">

                            <img
                                src="https://m.media-amazon.com/images/M/MV5BOWU2NjY5NWQtMjdkZi00ODJlLThkZTAtMzFlYmJmMGE2NjZkXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"
                                alt="Stranger Things 5"
                                width="129.8px"
                            >

                        </div>

                    </div>

                    <div class="col-6">

                        <div class="cover c2">

                            <img
                                src="https://m.media-amazon.com/images/M/MV5BZGJkZTEzNmUtYmY4NS00OTU1LTk3YTMtNmY4MzY4YmMxNWE5XkEyXkFqcGc@._V1_.jpg"
                                alt="The Return of The Living Dead"
                                width="130px"
                            >

                        </div>

                    </div>

                    <div class="col-6">

                        <div class="cover c3">

                            <img
                                src="https://m.media-amazon.com/images/M/MV5BMTc0MzgzNTI3N15BMl5BanBnXkFtZTcwNDk3MDIzMQ@@._V1_FMjpg_UX1000_.jpg"
                                alt="Hard Candy"
                                width="129.8px"
                            >

                        </div>

                    </div>

                    <div class="col-6">

                        <div class="cover c4">

                            <img
                                src="https://m.media-amazon.com/images/M/MV5BMjI5OTk3Mjg4MV5BMl5BanBnXkFtZTcwNzQ2NTQxNw@@._V1_FMjpg_UX1000_.jpg"
                                alt="Sleeping Beauty"
                                width="130px"
                            >

                        </div>

                    </div>

                </div>

                <!-- LANZAMIENTOS -->
                <div class="sidebar-header">

                    <span>LANZAMIENTOS</span>

                    <button
                        class="btn-ver-todas"
                        onclick="window.location.href='./recommendations.html?section=lanzamientos'"
                    >
                        Ver todas
                    </button>

                </div>

                <div class="row g-2">

                    <div class="col-4">

                        <div class="cover c5">

                            <img
                                src="https://m.media-amazon.com/images/M/MV5BZmM3ZDU3ODItZmY5Yi00OTQ2LWE5OTctZTA5NDBhMWJkOGY3XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"
                                alt="Devil Wears Prada 2"
                                width="80px"
                            >

                        </div>

                    </div>

                    <div class="col-4">

                        <div class="cover c6">

                            <img
                                src="https://m.media-amazon.com/images/M/MV5BNzllNmRlN2EtMDQyOC00ODJjLTg4OWQtZDNmNGU3YzlkNjc1XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"
                                alt="Michael"
                                width="80px"
                            >

                        </div>

                    </div>

                    <div class="col-4">

                        <div class="cover c7">

                            <img
                                src="https://m.media-amazon.com/images/M/MV5BZTI1YTBiNmEtYWUxZi00YzFkLWIzNjMtMmZjMmY2NzM0ZWMzXkEyXkFqcGc@._V1_.jpg"
                                alt="Toy Story 5"
                                width="80px"
                            >

                        </div>

                    </div>

                </div>

            </div>

        </aside>

    </div>

    <!-- OVERLAY del drawer -->
    <div class="sidebar-drawer-overlay" id="sidebarDrawerOverlay"></div>


    <!-- MODAL DE PELÍCULA -->
    <div class="film-modal-overlay" id="filmModalOverlay" aria-hidden="true">
        <div class="film-modal" role="dialog" aria-modal="true" aria-labelledby="filmModalTitle">
            <button class="film-modal-close" id="filmModalClose" aria-label="Cerrar">✕</button>

            <div class="film-modal-body">
                <div class="film-modal-poster" id="filmModalPoster"></div>

                <div class="film-modal-info">
                    <div class="film-modal-title" id="filmModalTitle"></div>
                    <div class="film-modal-sub" id="filmModalSub"></div>
                    <div class="film-modal-tags" id="filmModalTags"></div>
                    <div class="film-modal-cast" id="filmModalCast"></div>
                    <p class="film-modal-desc" id="filmModalDesc"></p>
                </div>
            </div>
        </div>
    </div>


    <!-- BOTTOM NAV MOBILE -->
    <nav class="bottom-nav" aria-label="Navegación móvil">

        <div class="inner">

            <button class="bottom-nav-btn">

                <span>
                    <img
                        src="../img/trending.webp"
                        alt="Trending"
                        width="50px"
                    >
                </span>

                <span class="bottom-nav-label">
                    Trending
                </span>

            </button>

            <button
                class="bottom-nav-btn"
                onclick="window.location.href='./home.html'"
            >

                <span>
                    <img
                        src="../img/myhomies.webp"
                        alt="Mis Homies"
                        width="70px"
                    >
                </span>

                <span class="bottom-nav-label">
                    Mis Homies
                </span>

            </button>

            <button class="bottom-nav-btn">

                <span>
                    <img
                        src="../img/clapperboard.webp"
                        alt="Estrenos"
                        width="40px"
                    >
                </span>

                <span class="bottom-nav-label">
                    Estrenos
                </span>

            </button>

            <button
                class="bottom-nav-btn"
                onclick="window.location.href='./profile.html'"
            >

                <span>
                    <img
                        src="../img/home_profileicon(noglow).webp"
                        alt="Perfil"
                        width="40px"
                    >
                </span>

                <span class="bottom-nav-label">
                    Perfil
                </span>

            </button>

        </div>

    </nav>

    <!-- SockJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>

    <!-- STOMP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <!-- APP -->
    <script
        type="module"
        src="../src/JS/script.js"
    ></script>

    <script
        type="module"
        src="../src/JS/webSocket.js"
    ></script>

    <script>

        document.addEventListener(
            "nuevaCalificacion",
            function (e) {

                const calificacion = e.detail;

                console.log(
                    "Nueva calificación en tiempo real:",
                    calificacion
                );

            }
        );

        function cerrarSesion() {

            localStorage.removeItem("token");
            localStorage.removeItem("usuario");

            window.location.href = "./login.html";

        }

    </script>

</body>

</html>
